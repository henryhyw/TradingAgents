[llm]
provider = "vertex"
model = "gemini-2.5-flash"
deep_model = "gemini-2.5-flash"
quick_model = "gemini-2.5-flash"
reasoning_effort = "low"
temperature = 0.0
vertex_region = "us-central1"
timeout_seconds = 90.0
max_retries = 1

[run]
default_shortlist_size = 8
market_timezone = "America/New_York"
report_timezone = "America/New_York"
research_analysts = ["market", "social", "news", "fundamentals"]
max_shortlist_per_sector = 2
portfolio_rebalance_buffer = 0.0025
loop_sleep_seconds = 60

[data]
provider = "yfinance"
history_lookback_days = 260
screen_lookback_days = 90
shortlist_min_history_days = 60
critical_history_days = 60
min_price = 10.0
min_avg_dollar_volume = 20000000.0
max_news_items = 8
cache_ttl_hours = 12
earnings_blackout_days = 3
correlation_lookback_days = 90
universe_min_observations = 60
regime_min_proxy_coverage_fraction = 0.70
regime_min_critical_proxy_count = 2
shortlist_min_data_coverage_fraction = 0.80
history_retry_attempts = 2
history_retry_backoff_seconds = 0.7
fail_live_run_on_data_impairment = true
breakout_lookback_days = 20
breakout_confirmation_buffer_fraction = 0.0015
risk_on_breakout_buffer_multiplier = 0.50
risk_on_near_breakout_floor = -0.004
pullback_ma_short_days = 20
pullback_ma_long_days = 50
pullback_max_distance_fraction = 0.04
pullback_reacceleration_min_return_3d = 0.005
risk_on_pullback_distance_multiplier = 1.35
risk_on_pullback_reacceleration_min_return_3d = 0.0025
max_extension_over_ma20_fraction = 0.09
overheat_extension_fraction = 0.14
overheat_rsi_threshold = 78.0
entry_confidence_min = 0.58
risk_on_entry_confidence_relief = 0.04
risk_on_near_miss_confidence_relief = 0.12
risk_on_near_miss_max_extension_penalty = 0.65
risk_on_near_miss_max_overheat_penalty = 0.70
risk_on_min_strong_trend_return_20d = 0.04
risk_on_min_relative_strength_20d = 0.005
regime_critical_proxies = ["SPY", "QQQ", "^VIX"]
regime_proxies = ["SPY", "QQQ", "IWM", "XLK", "XLF", "XLI", "XLY", "XLU", "XLP", "TLT", "IEF", "UUP", "GLD", "USO", "^VIX"]

[risk]
long_only = true
max_position_size_fraction = 0.05
max_gross_exposure_fraction = 0.30
daily_loss_limit_fraction = 0.02
max_new_opening_trades_per_symbol_per_day = 1
stop_opening_after_losing_exits = 3
minimum_cash_buffer_fraction = 0.05
max_sector_exposure_fraction = 0.15
max_single_theme_positions = 3
correlation_threshold = 0.85
high_correlation_scale = 0.60
volatility_target_annual = 0.28
volatility_floor_annual = 0.12
volatility_ceiling_annual = 0.60
cooldown_days_after_loss = 2
cooldown_days_after_rejection = 1
regime_risk_on_multiplier = 1.10
regime_balanced_multiplier = 1.00
regime_risk_off_multiplier = 0.70
regime_high_vol_multiplier = 0.50
trim_profit_trigger_fraction = 0.10
reduce_to_core_profit_trigger_fraction = 0.18
risk_on_trim_profit_trigger_fraction = 0.07
risk_on_reduce_to_core_profit_trigger_fraction = 0.15
risk_on_starter_position_fraction = 0.025
risk_on_starter_min_fraction = 0.0125
risk_on_starter_max_fraction = 0.025
scale_out_fraction = 0.33
reduce_to_core_target_fraction = 0.02
time_stop_days = 8
time_stop_min_progress_fraction = 0.02
trend_failure_ma_slack_fraction = 0.0
trend_failure_relative_strength_floor = -0.02

[paper]
starting_cash = 100000.0
fill_model = "same_bar_close"
slippage_bps = 10.0
commission_per_order = 1.0
allow_fractional_shares = false

[storage]
home_subdir = ".tradingagents"
database_name = "tradingagents.db"

[gcp]
project_id = "ta-henry-2026"
region = "us-central1"
zone = "us-central1-a"
vm_name = "ta-runner-01"
bucket_name = "ta-artifacts-ta-henry-2026"
service_account_name = "ta-runner-sa"
machine_type = "e2-micro"
boot_disk_size_gb = 20
boot_disk_type = "pd-standard"
os_image_family = "ubuntu-2204-lts"
os_image_project = "ubuntu-os-cloud"
publish_on_run = false
reports_prefix = "reports"
snapshots_prefix = "snapshots"
